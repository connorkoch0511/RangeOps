[pytest]
DJANGO_SETTINGS_MODULE = rangeops_web.settings
# Default collection is the Django app only; the Playwright E2E suite in e2e/
# is run explicitly (`pytest e2e/`) and needs extra deps, so keep it out of the
# default run.
testpaths = ops
python_files = tests.py test_*.py *_tests.py
# Only collect test *functions* (test_*); avoids grabbing the TestRun ORM model.
python_classes = *Tests
